name: Token Count

on:
  push:
    branches: [main]
    paths:
      - "SKILL.md"
      - "SKILL-fun.md"
  pull_request:
    paths:
      - "SKILL.md"
      - "SKILL-fun.md"

jobs:
  count-tokens:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install tiktoken
        run: bun add tiktoken

      - name: Count tokens
        id: count
        run: |
          TOTAL=$(bun -e '
          import { encoding_for_model } from "tiktoken";
          import { readFileSync, existsSync } from "fs";
          const enc = encoding_for_model("gpt-4o");
          let total = 0;
          for (const f of ["SKILL.md"].filter(f => existsSync(f))) {
            const tokens = enc.encode(readFileSync(f, "utf-8")).length;
            console.error(`${f}: ${tokens} tokens`);
            total += tokens;
          }
          enc.free();
          console.log(total);
          ')
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "Total: $TOTAL tokens"

      - name: Update badge gist
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.BADGE_GIST_ID }}
          filename: x-commit-tokens.json
          label: tokens
          message: ${{ steps.count.outputs.total }}
          valColorRange: ${{ steps.count.outputs.total }}
          minColorRange: 0
          maxColorRange: 3000
          invertColorRange: true

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const total = '${{ steps.count.outputs.total }}';
            const emoji = total < 1000 ? '🟢' : total < 2000 ? '🟡' : '🔴';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} **Token count:** ${total} tokens across all skill files`
            });
